name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what you'd like to see.

  - type: textarea
    id: problem
    attributes:
      label: Problem or Use Case
      description: What problem are you trying to solve? Why do you need this feature?
      placeholder: I want to be able to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any workarounds or alternative approaches?

  - type: dropdown
    id: capability
    attributes:
      label: Related Capability
      description: Does this relate to a specific AI capability?
      options:
        - Text Generation
        - Image Generation
        - Embeddings
        - Speech/Audio
        - Routing Logic
        - Admin UI
        - REST API
        - Other

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other details, mockups, or examples
