name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.

  - type: input
    id: version
    attributes:
      label: Plugin Version
      description: Which version of AI Router are you using?
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: wp-version
    attributes:
      label: WordPress Version
      placeholder: "7.0"
    validations:
      required: true

  - type: input
    id: php-version
    attributes:
      label: PHP Version
      placeholder: "8.3"
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: AI Provider
      description: Which provider(s) are you using?
      multiple: true
      options:
        - OpenAI
        - Azure OpenAI
        - Anthropic
        - Ollama
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Go to Settings → Connectors
        2. Add a new configuration
        3. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: Paste any relevant error messages or debug logs
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other details (screenshots, configuration, etc.)
